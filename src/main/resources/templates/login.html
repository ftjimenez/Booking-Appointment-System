<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Sign in — Appointment Desk')}">
    <title>Sign in</title>
</head>
<body class="app-body">

<div class="app-auth-wrap">
    <div class="app-auth-card">
        <div class="app-auth-brand">
            <a th:href="@{/}">
                <div class="app-auth-brand-title">
                    <i class="bi bi-calendar2-check" aria-hidden="true"></i> Appointment Desk
                </div>
                <div class="app-auth-brand-tagline">Sign in to manage your bookings</div>
            </a>
        </div>

        <h2>Sign in</h2>

        <div th:if="${registered}" class="alert alert-success border-0" role="alert">Registration successful. You can sign in now.</div>
        <div th:if="${param.error}" class="alert alert-danger border-0" role="alert">Invalid username or password.</div>
        <div th:if="${param.logout}" class="alert alert-info border-0" role="alert">You have been logged out.</div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold" for="username">Username</label>
                <input class="form-control" id="username" name="username" type="text" autocomplete="username" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold" for="password">Password</label>
                <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">
                <i class="bi bi-box-arrow-in-right me-1" aria-hidden="true"></i> Login
            </button>
        </form>

        <p class="mt-4 mb-0 text-center small">
            <span class="text-muted">No account?</span>
            <a th:href="@{/register}" class="app-link-muted ms-1">Create one</a>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
