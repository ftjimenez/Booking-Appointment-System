<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head th:replace="~{fragments :: head('Appointment Booking')}">
    <title>Appointment Booking</title>
</head>
<body class="app-body">

<div class="app-shell">

    <div th:replace="~{fragments :: navbar}"></div>

    <header class="app-page-hero">
        <h1>Appointment Booking</h1>
        <p>Add a new booking and review everything on your calendar in one place.</p>
    </header>

    <div class="app-card mb-4">
        <div class="app-card-header">
            <i class="bi bi-plus-circle me-2" aria-hidden="true"></i> New appointment
        </div>
        <div class="app-card-body">
            <form th:action="@{/book}" th:object="${appointment}" method="post" class="row g-3">
                <div class="col-12 col-md-6 col-lg-3">
                    <label class="app-form-label" for="name">Customer name</label>
                    <input type="text" id="name" th:field="*{name}" class="form-control" placeholder="e.g. Jane Doe" required>
                    <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger small d-block mt-1"></span>
                </div>
                <div class="col-12 col-md-6 col-lg-3">
                    <label class="app-form-label" for="description">Description</label>
                    <input type="text" id="description" th:field="*{description}" class="form-control" placeholder="What is it for?" required>
                    <span th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="text-danger small d-block mt-1"></span>
                </div>
                <div class="col-12 col-sm-6 col-lg-2">
                    <label class="app-form-label" for="date">Date</label>
                    <input type="date" id="date" th:field="*{date}" class="form-control" required>
                    <span th:if="${#fields.hasErrors('date')}" th:errors="*{date}" class="text-danger small d-block mt-1"></span>
                </div>
                <div class="col-12 col-sm-6 col-lg-2">
                    <label class="app-form-label" for="time">Time</label>
                    <input type="time" id="time" th:field="*{time}" class="form-control" required>
                    <span th:if="${#fields.hasErrors('time')}" th:errors="*{time}" class="text-danger small d-block mt-1"></span>
                </div>
                <div class="col-12 col-lg-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-check-lg me-1" aria-hidden="true"></i> Book
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div th:if="${message}" class="alert alert-info border-0 shadow-sm mb-4" role="status" th:text="${message}"></div>

    <div class="app-card">
        <div class="app-card-header d-flex align-items-center justify-content-between flex-wrap gap-2">
            <span><i class="bi bi-list-ul me-2" aria-hidden="true"></i> Your appointments</span>
        </div>
        <div class="p-0">
            <div th:if="${#lists.isEmpty(appointments)}" class="empty-state">
                <i class="bi bi-inbox" aria-hidden="true"></i>
                <p>No appointments yet. Fill out the form above to create your first booking.</p>
            </div>
            <div th:unless="${#lists.isEmpty(appointments)}" class="app-table-wrap">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                    <tr>
                        <th scope="col">Name</th>
                        <th scope="col">Description</th>
                        <th scope="col">Date</th>
                        <th scope="col">Time</th>
                        <th scope="col" class="text-end">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="appt : ${appointments}">
                        <td th:text="${appt.name}">—</td>
                        <td th:text="${appt.description}">—</td>
                        <td th:text="${appt.date}">—</td>
                        <td th:text="${appt.time}">—</td>
                        <td class="text-end">
                            <div class="app-action-btns justify-content-end">
                                <a th:href="@{'/edit/' + ${appt.id}}" class="btn btn-sm btn-outline-warning">
                                    <i class="bi bi-pencil-square me-1" aria-hidden="true"></i> Edit
                                </a>
                                <a th:href="@{'/delete/' + ${appt.id}}" class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('Delete this appointment?');">
                                    <i class="bi bi-trash me-1" aria-hidden="true"></i> Delete
                                </a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
