<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Appointment Booking System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #cccccc; }
        .container {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h2, h3 { color: #000000; }
    </style>
</head>

<body>
<div class="container mt-4">

    <div th:replace="~{fragments :: navbar}"></div>

    <h2 class="mb-4">Appointment Booking System</h2>

    <!-- FORM -->
    <form th:action="@{/book}" th:object="${appointment}" method="post" class="row g-3 mb-3">

        <div class="col-md-3">
            <input type="text" th:field="*{name}" class="form-control" placeholder="Customer Name" required>
            <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger"></span>
        </div>

        <div class="col-md-3">
            <input type="text" th:field="*{description}" class="form-control" placeholder="Description" required>
            <span th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="text-danger"></span>
        </div>

        <div class="col-md-3">
            <input type="date" th:field="*{date}" class="form-control" required>
            <span th:if="${#fields.hasErrors('date')}" th:errors="*{date}" class="text-danger"></span>
        </div>

        <div class="col-md-2">
            <input type="time" th:field="*{time}" class="form-control" required>
            <span th:if="${#fields.hasErrors('time')}" th:errors="*{time}" class="text-danger"></span>
        </div>

        <div class="col-md-1">
            <button type="submit" class="btn btn-primary">Book</button>
        </div>

    </form>

    <!-- MESSAGE -->
    <div th:if="${message}" class="alert alert-info" th:text="${message}"></div>

    <!-- TABLE -->
    <h3>All Appointments</h3>

    <table class="table table-striped table-hover mt-2">
        <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Description</th>
                <th>Date</th>
                <th>Time</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="appt : ${appointments}">
                <td th:text="${appt.name}"></td>
                <td th:text="${appt.description}"></td>
                <td th:text="${appt.date}"></td>
                <td th:text="${appt.time}"></td>
                <td>
                    <a th:href="@{'/edit/' + ${appt.id}}" class="btn btn-sm btn-warning">Edit</a>
                    <a th:href="@{'/delete/' + ${appt.id}}" class="btn btn-sm btn-danger"
                       onclick="return confirm('Are you sure you want to delete?');">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>

</div>
</body>
</html>
