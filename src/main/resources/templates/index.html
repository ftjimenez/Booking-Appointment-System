<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Appointment Booking System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #FFD1DC; }
        .container {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h2, h3 { color: #FF69B4; }
    </style>
</head>

<body>
<div class="container mt-4">

    <h2 class="mb-4">Appointment Booking System</h2>

    <!-- FORM -->
    <form th:action="@{/book}" th:object="${appointment}" method="post" class="row g-3 mb-3">

        <div class="col-md-4">
            <input type="text" th:field="*{customerName}" class="form-control" placeholder="Customer Name" required>
        </div>

        <div class="col-md-4">
            <input type="text" th:field="*{serviceType}" class="form-control" placeholder="Service Type" required>
        </div>

        <div class="col-md-3">
            <input type="date" th:field="*{date}" class="form-control" required>
        </div>

        <div class="col-md-1">
            <button type="submit" class="btn btn-primary">Book</button>
        </div>

    </form>

    <!-- MESSAGE -->
    <div th:if="${message}" class="alert alert-info" th:text="${message}"></div>

    <!-- TABLE -->
    <h3>All Appointments</h3>

    <table class="table table-striped table-hover mt-2">
        <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Service</th>
                <th>Date</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="appt : ${appointments}">
                <td th:text="${appt.customerName}"></td>
                <td th:text="${appt.serviceType}"></td>
                <td th:text="${appt.date}"></td>
                <td>
                    <a th:href="@{'/edit/' + ${appt.id}}" class="btn btn-sm btn-warning">Edit</a>
                    <a th:href="@{'/delete/' + ${appt.id}}" class="btn btn-sm btn-danger"
                       onclick="return confirm('Are you sure you want to delete?');">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>

</div>
</body>
</html>
