<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Appointment Booking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>

<nav th:fragment="navbar" class="app-navbar" aria-label="Main">
    <a th:href="@{/}" class="app-brand">
        <span class="app-brand-title"><i class="bi bi-calendar2-check" aria-hidden="true"></i> Appointment Desk</span>
        <span class="app-brand-tagline">Schedule and manage bookings</span>
    </a>
    <div class="d-flex flex-wrap align-items-center gap-2">
        <span sec:authorize="isAuthenticated()" class="app-user-badge">
            Signed in as <strong sec:authentication="name">user</strong>
        </span>
        <a sec:authorize="isAnonymous()" th:href="@{/login}" class="btn btn-outline-primary btn-sm">
            <i class="bi bi-box-arrow-in-right me-1" aria-hidden="true"></i> Login
        </a>
        <a sec:authorize="isAnonymous()" th:href="@{/register}" class="btn btn-primary btn-sm">
            <i class="bi bi-person-plus me-1" aria-hidden="true"></i> Register
        </a>
        <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="d-inline m-0">
            <button type="submit" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-box-arrow-right me-1" aria-hidden="true"></i> Logout
            </button>
        </form>
    </div>
</nav>

</body>
</html>
