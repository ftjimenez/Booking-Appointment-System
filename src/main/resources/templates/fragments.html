<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<div th:fragment="navbar" class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4 pb-3 border-bottom border-secondary-subtle">
    <div class="d-flex align-items-center gap-3">
        <span sec:authorize="isAuthenticated()" class="text-secondary">
            Signed in as <strong sec:authentication="name"></strong>
        </span>
    </div>
    <div class="d-flex align-items-center gap-2">
        <a sec:authorize="isAnonymous()" th:href="@{/login}" class="btn btn-outline-primary btn-sm">Login</a>
        <a sec:authorize="isAnonymous()" th:href="@{/register}" class="btn btn-primary btn-sm">Register</a>
        <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-outline-secondary btn-sm">Logout</button>
        </form>
    </div>
</div>
</body>
</html>
