<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Edit Appointment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #aaaaaa; }
        .container {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h2 { color: #000000; }
    </style>
</head>

<body>
<div class="container mt-4">

    <div th:replace="~{fragments :: navbar}"></div>

    <h2>Edit Appointment</h2>

    <form th:action="@{'/update/' + ${appointment.id}}" 
          th:object="${appointment}" 
          method="post" class="row g-3">

        <div class="col-md-3">
            <input type="text" th:field="*{name}" class="form-control" required>
            <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger"></span>
        </div>

        <div class="col-md-3">
            <input type="text" th:field="*{description}" class="form-control" required>
            <span th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="text-danger"></span>
        </div>

        <div class="col-md-2">
            <input type="date" th:field="*{date}" class="form-control" required>
            <span th:if="${#fields.hasErrors('date')}" th:errors="*{date}" class="text-danger"></span>
        </div>

        <div class="col-md-2">
            <input type="time" th:field="*{time}" class="form-control" required>
            <span th:if="${#fields.hasErrors('time')}" th:errors="*{time}" class="text-danger"></span>
        </div>

        <div class="col-md-1">
            <button type="submit" class="btn btn-success">Update</button>
        </div>

    </form>

    <a href="/" class="btn btn-secondary mt-3">Back</a>

</div>
</body>
</html>
