<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Appointment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #FFD1DC; }
        .container {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h2 { color: #FF69B4; }
    </style>
</head>

<body>
<div class="container mt-4">

    <h2>Edit Appointment</h2>

    <form th:action="@{'/update/' + ${appointment.id}}" 
          th:object="${appointment}" 
          method="post" class="row g-3">

        <div class="col-md-4">
            <input type="text" th:field="*{customerName}" class="form-control" required>
        </div>

        <div class="col-md-4">
            <input type="text" th:field="*{serviceType}" class="form-control" required>
        </div>

        <div class="col-md-3">
            <input type="date" th:field="*{date}" class="form-control" required>
        </div>

        <div class="col-md-1">
            <button type="submit" class="btn btn-success">Update</button>
        </div>

    </form>

    <a href="/" class="btn btn-secondary mt-3">Back</a>

</div>
</body>
</html>
