<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Create account — Appointment Desk')}">
    <title>Create account</title>
</head>
<body class="app-body">

<div class="app-auth-wrap">
    <div class="app-auth-card">
        <div class="app-auth-brand">
            <a th:href="@{/}">
                <div class="app-auth-brand-title">
                    <i class="bi bi-calendar2-check" aria-hidden="true"></i> Appointment Desk
                </div>
                <div class="app-auth-brand-tagline">Create an account to start booking</div>
            </a>
        </div>

        <h2>Create account</h2>

        <form th:action="@{/register}" th:object="${registerRequest}" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold" for="username">Username</label>
                <input class="form-control" id="username" th:field="*{username}" type="text" autocomplete="username" required>
                <span th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="text-danger small d-block mt-1"></span>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold" for="displayName">Name</label>
                <input class="form-control" id="displayName" th:field="*{displayName}" type="text" autocomplete="name" required>
                <span th:if="${#fields.hasErrors('displayName')}" th:errors="*{displayName}" class="text-danger small d-block mt-1"></span>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold" for="email">Email</label>
                <input class="form-control" id="email" th:field="*{email}" type="email" autocomplete="email" required>
                <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger small d-block mt-1"></span>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold" for="password">Password</label>
                <input class="form-control" id="password" th:field="*{password}" type="password" autocomplete="new-password" required>
                <p class="app-hint mb-0">At least 8 characters.</p>
                <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-danger small d-block mt-1"></span>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold" for="confirmPassword">Confirm password</label>
                <input class="form-control" id="confirmPassword" th:field="*{confirmPassword}" type="password" autocomplete="new-password" required>
                <span th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}" class="text-danger small d-block mt-1"></span>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">
                <i class="bi bi-person-plus me-1" aria-hidden="true"></i> Register
            </button>
        </form>

        <p class="mt-4 mb-0 text-center small">
            <span class="text-muted">Already have an account?</span>
            <a th:href="@{/login}" class="app-link-muted ms-1">Sign in</a>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
