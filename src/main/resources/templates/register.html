<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register — Appointment Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #cccccc; }
        .card-register {
            max-width: 480px;
            margin: 3rem auto;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            background: #fff;
        }
    </style>
</head>
<body>
<div class="card-register">
    <h2 class="mb-4">Create account</h2>

    <form th:action="@{/register}" th:object="${registerRequest}" method="post">
        <div class="mb-3">
            <label class="form-label" for="username">Username</label>
            <input class="form-control" id="username" th:field="*{username}" type="text" autocomplete="username" required>
            <span th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="text-danger small d-block"></span>
        </div>
        <div class="mb-3">
            <label class="form-label" for="displayName">Name</label>
            <input class="form-control" id="displayName" th:field="*{displayName}" type="text" autocomplete="name" required>
            <span th:if="${#fields.hasErrors('displayName')}" th:errors="*{displayName}" class="text-danger small d-block"></span>
        </div>
        <div class="mb-3">
            <label class="form-label" for="email">Email</label>
            <input class="form-control" id="email" th:field="*{email}" type="email" autocomplete="email" required>
            <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger small d-block"></span>
        </div>
        <div class="mb-3">
            <label class="form-label" for="password">Password</label>
            <input class="form-control" id="password" th:field="*{password}" type="password" autocomplete="new-password" required>
            <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-danger small d-block"></span>
        </div>
        <div class="mb-3">
            <label class="form-label" for="confirmPassword">Confirm password</label>
            <input class="form-control" id="confirmPassword" th:field="*{confirmPassword}" type="password" autocomplete="new-password" required>
            <span th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}" class="text-danger small d-block"></span>
        </div>
        <button type="submit" class="btn btn-primary w-100">Register</button>
    </form>

    <p class="mt-3 mb-0 text-center">
        Already have an account? <a th:href="@{/login}">Sign in</a>
    </p>
</div>
</body>
</html>
