spring.application.name=appointment
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/appointment_db
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.generate-ddl=true
spring.h2.console.path=/h2-console
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT (HS256): use a long random secret in production (min 32 bytes / 256 bits)
jwt.secret=dev-only-change-me-use-at-least-32-chars!!
jwt.expiration-ms=86400000
